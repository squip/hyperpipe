version: '3.8'

# Legacy FEVELA_* environment variable names are still accepted here for compatibility.
services:
  hypertuna:
    container_name: hypertuna-nginx
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_PROXY_SERVER: ${FEVELA_PROXY_SERVER_URL:-http://localhost:8090}
    ports:
      - '8089:80'
    restart: unless-stopped
    networks:
      - hypertuna

  proxy-server:
    image: ghcr.io/danvergara/jumble-proxy-server:latest
    environment:
      - ALLOW_ORIGIN=${FEVELA_SOCIAL_URL:-http://localhost:8089}
      - FEVELA_PROXY_GITHUB_TOKEN=${FEVELA_PROXY_GITHUB_TOKEN}
      - ENABLE_PPROF=true
      - PORT=8080
    ports:
      - '8090:8080'
    networks:
      - hypertuna

networks:
  hypertuna:
