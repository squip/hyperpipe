<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hypertuna Gateway Admin</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <section id="login-panel" class="login-shell">
      <article class="login-card">
        <h1>Gateway Admin</h1>
        <p class="muted">Authenticate with your operator nsec to open the admin console.</p>

        <label class="field-label">
          Operator nsec (hex)
          <input id="login-nsec" class="input" type="password" placeholder="64-char hex private key" />
        </label>

        <div class="derived-row">
          <span>Derived operator pubkey</span>
          <code id="login-derived-pubkey">-</code>
        </div>

        <div class="submit-row">
          <button id="btn-login" class="btn btn-primary" type="button">Sign In</button>
          <span id="login-status" class="muted"></span>
        </div>
      </article>
    </section>

    <div id="app-shell" class="app-shell hidden">
      <aside id="sidebar" class="sidebar">
        <div class="sidebar-brand">
          <h2>Hypertuna</h2>
          <p>Gateway Console</p>
        </div>

        <nav class="sidebar-nav">
          <button class="nav-item is-active" data-route="dashboard" type="button">Gateway Dashboard</button>
          <button class="nav-item" data-route="settings" type="button">Settings</button>
          <button class="nav-item" data-route="user-authorization" type="button">User Authorization</button>
        </nav>
      </aside>

      <div class="main-shell">
        <header class="topbar">
          <div class="topbar-left">
            <button id="btn-nav-toggle" class="btn btn-ghost mobile-only" type="button">Menu</button>
            <h1 id="topbar-title">Gateway Dashboard</h1>
          </div>
          <div class="topbar-actions">
            <button id="btn-refresh-all" class="btn" type="button">Refresh</button>
            <button id="btn-logout" class="btn btn-danger" type="button">Logout</button>
          </div>
        </header>

        <main id="view-container" class="view-container"></main>
      </div>
    </div>

    <section id="toast" class="toast hidden" role="status" aria-live="polite"></section>

    <script type="importmap">
      {
        "imports": {
          "@noble/curves/": "/admin/vendor/noble-curves/esm/",
          "@noble/hashes/": "/admin/vendor/noble-hashes/esm/",
          "@noble/hashes/utils": "/admin/vendor/noble-hashes/esm/utils.js",
          "@noble/hashes/crypto": "/admin/vendor/noble-hashes/esm/crypto.js"
        }
      }
    </script>
    <script type="module" src="./app.js"></script>
  </body>
</html>
