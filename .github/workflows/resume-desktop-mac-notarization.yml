name: Resume Desktop Mac Notarization

on:
  workflow_dispatch:
    inputs:
      source_run_id:
        description: Release Desktop run id that uploaded the signed mac app bundle
        required: true
        type: string
      release_tag:
        description: Desktop release tag to append macOS assets to
        required: true
        type: string
      arch:
        description: macOS architecture to resume
        required: true
        default: all
        type: choice
        options:
          - all
          - x64
          - arm64
      timeout_minutes:
        description: Additional minutes to wait for Apple notarization processing
        required: true
        default: '180'
        type: string
      submission_id:
        description: Optional Apple submission id override if no metadata artifact is available
        required: false
        type: string
  workflow_run:
    workflows:
      - Release Desktop
    types:
      - completed

permissions:
  contents: write
  actions: read

jobs:
  resolve-trigger:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.resolve.outputs.should_run }}
      source_run_id: ${{ steps.resolve.outputs.source_run_id }}
      release_tag: ${{ steps.resolve.outputs.release_tag }}
      arch: ${{ steps.resolve.outputs.arch }}
      timeout_minutes: ${{ steps.resolve.outputs.timeout_minutes }}
      submission_id: ${{ steps.resolve.outputs.submission_id }}
    steps:
      - id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          INPUT_SOURCE_RUN_ID: ${{ inputs.source_run_id }}
          INPUT_RELEASE_TAG: ${{ inputs.release_tag }}
          INPUT_ARCH: ${{ inputs.arch }}
          INPUT_TIMEOUT_MINUTES: ${{ inputs.timeout_minutes }}
          INPUT_SUBMISSION_ID: ${{ inputs.submission_id }}
          WORKFLOW_RUN_ID: ${{ github.event.workflow_run.id }}
          WORKFLOW_RUN_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          WORKFLOW_RUN_EVENT: ${{ github.event.workflow_run.event }}
          WORKFLOW_RUN_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "source_run_id=$INPUT_SOURCE_RUN_ID" >> "$GITHUB_OUTPUT"
            echo "release_tag=$INPUT_RELEASE_TAG" >> "$GITHUB_OUTPUT"
            echo "arch=${INPUT_ARCH:-all}" >> "$GITHUB_OUTPUT"
            echo "timeout_minutes=${INPUT_TIMEOUT_MINUTES:-180}" >> "$GITHUB_OUTPUT"
            echo "submission_id=${INPUT_SUBMISSION_ID:-}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$WORKFLOW_RUN_CONCLUSION" != "success" ] || [ "$WORKFLOW_RUN_EVENT" != "push" ]; then
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          context_dir="$RUNNER_TEMP/desktop-release-context"
          rm -rf "$context_dir"
          mkdir -p "$context_dir"

          if ! gh run download "$WORKFLOW_RUN_ID" --repo "$WORKFLOW_RUN_REPOSITORY" --name "desktop-release-context" --dir "$context_dir"; then
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          release_tag_file="$(find "$context_dir" -maxdepth 2 -type f -name 'release-tag.txt' -print -quit || true)"
          if [ -z "$release_tag_file" ]; then
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          release_tag="$(tr -d '\r\n' < "$release_tag_file")"
          if [ -z "$release_tag" ]; then
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "should_run=true" >> "$GITHUB_OUTPUT"
          echo "source_run_id=$WORKFLOW_RUN_ID" >> "$GITHUB_OUTPUT"
          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"
          echo "arch=all" >> "$GITHUB_OUTPUT"
          echo "timeout_minutes=180" >> "$GITHUB_OUTPUT"
          echo "submission_id=" >> "$GITHUB_OUTPUT"

  select-matrix:
    needs: resolve-trigger
    if: needs.resolve-trigger.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          case "${{ needs.resolve-trigger.outputs.arch }}" in
            x64)
              echo 'matrix={"include":[{"os":"macos-15-intel","arch":"x64","release_dir":"mac"}]}' >> "$GITHUB_OUTPUT"
              ;;
            arm64)
              echo 'matrix={"include":[{"os":"macos-14","arch":"arm64","release_dir":"mac-arm64"}]}' >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo 'matrix={"include":[{"os":"macos-15-intel","arch":"x64","release_dir":"mac"},{"os":"macos-14","arch":"arm64","release_dir":"mac-arm64"}]}' >> "$GITHUB_OUTPUT"
              ;;
          esac

  resume:
    needs:
      - resolve-trigger
      - select-matrix
    if: needs.resolve-trigger.outputs.should_run == 'true'
    timeout-minutes: 240
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix: ${{ fromJson(needs.select-matrix.outputs.matrix) }}
    runs-on: ${{ matrix.os }}
    env:
      DESKTOP_STANDALONE_DIR: .desktop-release-workdir
      SOURCE_RUN_ID: ${{ needs.resolve-trigger.outputs.source_run_id }}
      RELEASE_TAG: ${{ needs.resolve-trigger.outputs.release_tag }}
      NOTARIZE_TIMEOUT_MINUTES: ${{ needs.resolve-trigger.outputs.timeout_minutes }}
      SUBMISSION_ID_OVERRIDE: ${{ needs.resolve-trigger.outputs.submission_id }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.sha }}

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Prepare standalone desktop workspace
        run: node ./scripts/stage-standalone-workspace.cjs ./hyperpipe-desktop "${{ env.DESKTOP_STANDALONE_DIR }}"

      - name: Install standalone desktop dependencies
        working-directory: ${{ env.DESKTOP_STANDALONE_DIR }}
        run: npm install --no-audit --no-fund

      - name: Restore signed macOS app bundle
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          artifact_dir="${RUNNER_TEMP}/signed-${{ matrix.arch }}"
          rm -rf "$artifact_dir"
          mkdir -p "$artifact_dir"
          gh run download "$SOURCE_RUN_ID" --repo "${{ github.repository }}" --name "signed-macos-${{ matrix.arch }}" --dir "$artifact_dir"
          archive_path="$(find "$artifact_dir" -maxdepth 2 -type f -name 'Hyperpipe-*-signed-app.zip' -print -quit || true)"
          if [ -z "$archive_path" ]; then
            echo "Downloaded artifact contents:" >&2
            find "$artifact_dir" -maxdepth 4 -print >&2 || true
            echo "Signed macOS app archive not found in downloaded artifact" >&2
            exit 1
          fi
          dest_dir="${DESKTOP_STANDALONE_DIR}/release/${{ matrix.release_dir }}"
          rm -rf "$dest_dir"
          mkdir -p "$dest_dir"
          ditto -x -k "$archive_path" "$dest_dir"
          if [ ! -d "$dest_dir/Hyperpipe.app" ]; then
            echo "Restored archive did not produce Hyperpipe.app" >&2
            find "$dest_dir" -maxdepth 4 -print >&2 || true
            exit 1
          fi

      - name: Restore notarization metadata
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          artifact_dir="${RUNNER_TEMP}/notarization-${{ matrix.arch }}"
          rm -rf "$artifact_dir"
          mkdir -p "$artifact_dir"
          if gh run download "$SOURCE_RUN_ID" --repo "${{ github.repository }}" --name "notarization-${{ matrix.arch }}" --dir "$artifact_dir"; then
            mkdir -p "${DESKTOP_STANDALONE_DIR}/.notarization"
            cp -R "$artifact_dir"/. "${DESKTOP_STANDALONE_DIR}/.notarization/"
          else
            echo "No notarization metadata artifact was available for ${{ matrix.arch }}." >&2
          fi

      - name: Notarize and staple restored macOS app
        working-directory: ${{ env.DESKTOP_STANDALONE_DIR }}
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          args=(wait --arch "${{ matrix.arch }}" --timeout-minutes "$NOTARIZE_TIMEOUT_MINUTES")
          if [ -n "$SUBMISSION_ID_OVERRIDE" ]; then
            args+=(--submission-id "$SUBMISSION_ID_OVERRIDE")
          fi
          node ./scripts/build-notarized-mac-release.cjs "${args[@]}"

      - name: Package notarized macOS release artifacts
        working-directory: ${{ env.DESKTOP_STANDALONE_DIR }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: node ./scripts/build-notarized-mac-release.cjs package --arch ${{ matrix.arch }}

      - name: Normalize macOS updater metadata
        working-directory: ${{ env.DESKTOP_STANDALONE_DIR }}
        run: node ./scripts/normalize-mac-release-metadata.cjs --arch ${{ matrix.arch }}

      - name: Upload notarization diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: resumed-notarization-${{ matrix.arch }}
          path: ${{ env.DESKTOP_STANDALONE_DIR }}/.notarization/**/*
          if-no-files-found: ignore
          include-hidden-files: true

      - name: Upload workflow artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: resumed-desktop-macos-${{ matrix.arch }}
          path: ${{ env.DESKTOP_STANDALONE_DIR }}/release/*

      - name: Publish release assets
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: ${{ env.DESKTOP_STANDALONE_DIR }}/release/*
          overwrite_files: true

  publish-release-metadata:
    needs:
      - resolve-trigger
      - resume
    if: needs.resolve-trigger.outputs.should_run == 'true' && success()
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ needs.resolve-trigger.outputs.release_tag }}
      RELEASE_ASSET_DIR: ${{ github.workspace }}/.release-artifacts/desktop-release-assets
      RELEASE_METADATA_DIR: ${{ github.workspace }}/.release-artifacts/desktop-release-metadata
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Download release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          rm -rf "$RELEASE_ASSET_DIR"
          mkdir -p "$RELEASE_ASSET_DIR"
          gh release download "$RELEASE_TAG" --repo "${{ github.repository }}" --dir "$RELEASE_ASSET_DIR"
          rm -f "$RELEASE_ASSET_DIR/SHA256SUMS.txt"
          if [ -f "$RELEASE_ASSET_DIR/latest-mac.yml" ] && [ ! -f "$RELEASE_ASSET_DIR/latest-mac-x64.yml" ]; then
            cp "$RELEASE_ASSET_DIR/latest-mac.yml" "$RELEASE_ASSET_DIR/latest-mac-x64.yml"
          fi
          if [ ! -f "$RELEASE_ASSET_DIR/latest-mac.yml" ] && [ -f "$RELEASE_ASSET_DIR/latest-mac-x64.yml" ]; then
            cp "$RELEASE_ASSET_DIR/latest-mac-x64.yml" "$RELEASE_ASSET_DIR/latest-mac.yml"
          fi

      - name: Regenerate combined release checksums
        run: node ./scripts/write-sha256sums.mjs --dir "${{ env.RELEASE_ASSET_DIR }}" --out "${{ env.RELEASE_ASSET_DIR }}/SHA256SUMS.txt"

      - name: Stage merged release metadata
        run: |
          set -euo pipefail
          rm -rf "$RELEASE_METADATA_DIR"
          mkdir -p "$RELEASE_METADATA_DIR"
          cp "$RELEASE_ASSET_DIR/SHA256SUMS.txt" "$RELEASE_METADATA_DIR/"
          for file in latest-mac.yml latest-mac-x64.yml latest-mac-arm64.yml; do
            if [ -f "$RELEASE_ASSET_DIR/$file" ]; then
              cp "$RELEASE_ASSET_DIR/$file" "$RELEASE_METADATA_DIR/"
            fi
          done

      - name: Upload merged release metadata
        uses: actions/upload-artifact@v4
        with:
          name: desktop-release-metadata
          path: ${{ env.RELEASE_METADATA_DIR }}/*
          if-no-files-found: error

      - name: Publish merged release metadata
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: ${{ env.RELEASE_METADATA_DIR }}/*
          overwrite_files: true

      - name: Publish completed release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release edit "$RELEASE_TAG" --repo "${{ github.repository }}" --draft=false
