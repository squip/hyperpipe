name: Release Desktop

on:
  workflow_dispatch:
  push:
    tags:
      - 'desktop-v*'

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install workspace dependencies
        run: npm ci

      - name: Verify core
        run: npm --workspace ./hyperpipe-core test

      - name: Verify gateway
        run: npm --workspace ./hyperpipe-gateway test

      - name: Verify deploy tooling
        run: npm --workspace ./deploy test

      - name: Verify desktop renderer
        run: |
          npm --workspace ./hyperpipe-desktop run test:unit
          npm --workspace ./hyperpipe-desktop run build:web

  package:
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-13
            builder_args: --mac dmg zip --x64
            csc_link_secret: MACOS_CSC_LINK
            csc_key_password_secret: MACOS_CSC_KEY_PASSWORD
            notarize: true
          - os: macos-14
            builder_args: --mac dmg zip --arm64
            csc_link_secret: MACOS_CSC_LINK
            csc_key_password_secret: MACOS_CSC_KEY_PASSWORD
            notarize: true
          - os: windows-latest
            builder_args: --win nsis --x64
            csc_link_secret: WIN_CSC_LINK
            csc_key_password_secret: WIN_CSC_KEY_PASSWORD
            notarize: false
          - os: ubuntu-latest
            builder_args: --linux AppImage --x64
            csc_link_secret: ''
            csc_key_password_secret: ''
            notarize: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install workspace dependencies
        run: npm ci

      - name: Install xvfb (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb

      - name: Run desktop verification
        run: |
          npm --workspace ./hyperpipe-desktop run test:unit
          npm --workspace ./hyperpipe-desktop run build:web

      - name: Run desktop electron tests
        if: runner.os == 'Linux'
        run: xvfb-run -a npm --workspace ./hyperpipe-desktop run test:electron

      - name: Run desktop electron tests
        if: runner.os != 'Linux'
        run: npm --workspace ./hyperpipe-desktop run test:electron

      - name: Build desktop release artifacts
        env:
          CSC_LINK: ${{ matrix.csc_link_secret != '' && secrets[matrix.csc_link_secret] || '' }}
          CSC_KEY_PASSWORD: ${{ matrix.csc_key_password_secret != '' && secrets[matrix.csc_key_password_secret] || '' }}
          APPLE_ID: ${{ matrix.notarize && secrets.APPLE_ID || '' }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ matrix.notarize && secrets.APPLE_APP_SPECIFIC_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ matrix.notarize && secrets.APPLE_TEAM_ID || '' }}
        run: npm --workspace ./hyperpipe-desktop run dist:desktop -- ${{ matrix.builder_args }}

      - name: Write checksums
        run: node ./scripts/write-sha256sums.mjs --dir ./hyperpipe-desktop/release --out ./hyperpipe-desktop/release/SHA256SUMS.txt

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.os }}
          path: hyperpipe-desktop/release/*

      - name: Publish release assets
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: hyperpipe-desktop/release/*
