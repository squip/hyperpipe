name: Release Desktop

on:
  workflow_dispatch:
  push:
    tags:
      - 'desktop-v*'

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install workspace dependencies
        run: npm ci

      - name: Install Rollup native binary
        run: node ./hyperpipe-desktop/scripts/install-rollup-native.cjs

      - name: Verify core
        run: npm --workspace ./hyperpipe-core test

      - name: Verify gateway
        run: npm --workspace ./hyperpipe-gateway test

      - name: Verify deploy tooling
        run: npm --workspace ./deploy test

      - name: Verify desktop renderer
        run: |
          npm --workspace ./hyperpipe-desktop run test:unit
          npm --workspace ./hyperpipe-desktop run build:web

      - name: Stage desktop release context
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        run: |
          set -euo pipefail
          mkdir -p .desktop-release-context
          printf '%s\n' "${GITHUB_REF_NAME}" > .desktop-release-context/release-tag.txt

      - name: Upload desktop release context
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: desktop-release-context
          path: .desktop-release-context/release-tag.txt
          if-no-files-found: error

  package:
    needs: verify
    timeout-minutes: 180
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - os: macos-15-intel
            arch: x64
            release_dir: mac
            builder_args: --mac dmg zip --x64
            notarize: true
            notarize_timeout_minutes: 90
          - os: macos-14
            arch: arm64
            release_dir: mac-arm64
            builder_args: --mac dmg zip --arm64
            notarize: true
            notarize_timeout_minutes: 120
          - os: windows-latest
            arch: x64
            release_dir: ''
            builder_args: --win nsis --x64
            notarize: false
          - os: ubuntu-latest
            arch: x64
            release_dir: ''
            builder_args: --linux AppImage --x64
            notarize: false
    runs-on: ${{ matrix.os }}
    env:
      DESKTOP_STANDALONE_DIR: .desktop-release-workdir
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Prepare standalone desktop workspace
        run: node ./scripts/stage-standalone-workspace.cjs ./hyperpipe-desktop "${{ env.DESKTOP_STANDALONE_DIR }}"

      - name: Install standalone desktop dependencies
        working-directory: ${{ env.DESKTOP_STANDALONE_DIR }}
        run: npm install --no-audit --no-fund

      - name: Install Rollup native binary
        working-directory: ${{ env.DESKTOP_STANDALONE_DIR }}
        run: node ./scripts/install-rollup-native.cjs

      - name: Smoke test desktop worker runtime
        working-directory: ${{ env.DESKTOP_STANDALONE_DIR }}
        run: |
          npm run prepare:release-runtime
          npm run smoke:worker-runtime

      - name: Prune native prebuilds for target platform
        working-directory: ${{ env.DESKTOP_STANDALONE_DIR }}
        run: node ./scripts/prune-native-prebuilds.cjs

      - name: Install xvfb (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb

      - name: Run desktop verification
        working-directory: ${{ env.DESKTOP_STANDALONE_DIR }}
        run: |
          npm run test:unit
          npm run build:web

      - name: Run desktop electron tests
        if: runner.os == 'Linux'
        working-directory: ${{ env.DESKTOP_STANDALONE_DIR }}
        run: xvfb-run -a npm run test:electron

      - name: Run desktop electron tests
        if: runner.os != 'Linux'
        working-directory: ${{ env.DESKTOP_STANDALONE_DIR }}
        run: npm run test:electron

      - name: Build desktop release artifacts (signed only)
        if: runner.os == 'macOS' && !(github.event_name == 'push' && startsWith(github.ref, 'refs/tags/'))
        working-directory: ${{ env.DESKTOP_STANDALONE_DIR }}
        env:
          CSC_LINK: ${{ secrets.MACOS_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MACOS_CSC_KEY_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npm run dist:desktop -- ${{ matrix.builder_args }}

      - name: Build signed macOS app bundle
        if: runner.os == 'macOS' && github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        working-directory: ${{ env.DESKTOP_STANDALONE_DIR }}
        env:
          CSC_LINK: ${{ secrets.MACOS_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MACOS_CSC_KEY_PASSWORD }}
        run: node ./scripts/build-notarized-mac-release.cjs build-app --arch ${{ matrix.arch }}

      - name: Submit macOS app for notarization
        if: runner.os == 'macOS' && github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        working-directory: ${{ env.DESKTOP_STANDALONE_DIR }}
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: node ./scripts/build-notarized-mac-release.cjs submit --arch ${{ matrix.arch }} --timeout-minutes ${{ matrix.notarize_timeout_minutes }}

      - name: Build desktop release artifacts
        if: runner.os != 'macOS'
        working-directory: ${{ env.DESKTOP_STANDALONE_DIR }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npm run dist:desktop -- ${{ matrix.builder_args }}

      - name: Write checksums
        if: success() && github.event_name == 'workflow_dispatch'
        run: node ./scripts/write-sha256sums.mjs --dir "${{ env.DESKTOP_STANDALONE_DIR }}/release" --out "${{ env.DESKTOP_STANDALONE_DIR }}/release/SHA256SUMS.txt"

      - name: Upload signed macOS app bundle
        if: success() && runner.os == 'macOS' && github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        working-directory: ${{ env.DESKTOP_STANDALONE_DIR }}
        run: |
          set -euo pipefail
          mkdir -p signed-app-artifacts
          ditto -c -k --sequesterRsrc --keepParent "release/${{ matrix.release_dir }}/Hyperpipe.app" "signed-app-artifacts/Hyperpipe-${{ matrix.arch }}-signed-app.zip"

      - name: Upload signed macOS app bundle
        if: success() && runner.os == 'macOS' && github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: ${{ env.DESKTOP_STANDALONE_DIR }}/signed-app-artifacts/Hyperpipe-${{ matrix.arch }}-signed-app.zip
          overwrite_files: true
          draft: true

      - name: Upload notarization diagnostics
        if: always() && runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: notarization-${{ matrix.arch }}
          path: ${{ env.DESKTOP_STANDALONE_DIR }}/.notarization/**/*
          if-no-files-found: ignore
          include-hidden-files: true

      - name: Upload workflow artifacts
        if: success() && !(runner.os == 'macOS' && github.event_name == 'push' && startsWith(github.ref, 'refs/tags/'))
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.os }}
          path: ${{ env.DESKTOP_STANDALONE_DIR }}/release/*

      - name: Publish release assets
        if: success() && github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') && runner.os != 'macOS'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: ${{ env.DESKTOP_STANDALONE_DIR }}/release/*
          overwrite_files: true
          draft: true
