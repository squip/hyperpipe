name: Release Desktop

on:
  workflow_dispatch:
  push:
    tags:
      - 'desktop-v*'

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install workspace dependencies
        run: npm ci

      - name: Install Rollup native binary
        run: node ./hyperpipe-desktop/scripts/install-rollup-native.cjs

      - name: Verify core
        run: npm --workspace ./hyperpipe-core test

      - name: Verify gateway
        run: npm --workspace ./hyperpipe-gateway test

      - name: Verify deploy tooling
        run: npm --workspace ./deploy test

      - name: Verify desktop renderer
        run: |
          npm --workspace ./hyperpipe-desktop run test:unit
          npm --workspace ./hyperpipe-desktop run build:web

  package:
    needs: verify
    timeout-minutes: 90
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - os: macos-15-intel
            arch: x64
            builder_args: --mac dmg zip --x64
            notarize: true
          - os: macos-14
            arch: arm64
            builder_args: --mac dmg zip --arm64
            notarize: true
          - os: windows-latest
            arch: x64
            builder_args: --win nsis --x64
            notarize: false
          - os: ubuntu-latest
            arch: x64
            builder_args: --linux AppImage --x64
            notarize: false
    runs-on: ${{ matrix.os }}
    env:
      DESKTOP_STANDALONE_DIR: .desktop-release-workdir
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Prepare standalone desktop workspace
        run: node ./scripts/stage-standalone-workspace.cjs ./hyperpipe-desktop "${{ env.DESKTOP_STANDALONE_DIR }}"

      - name: Install standalone desktop dependencies
        working-directory: ${{ env.DESKTOP_STANDALONE_DIR }}
        run: npm install --no-audit --no-fund

      - name: Install Rollup native binary
        working-directory: ${{ env.DESKTOP_STANDALONE_DIR }}
        run: node ./scripts/install-rollup-native.cjs

      - name: Prune native prebuilds for target platform
        working-directory: ${{ env.DESKTOP_STANDALONE_DIR }}
        run: node ./scripts/prune-native-prebuilds.cjs

      - name: Install xvfb (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb

      - name: Run desktop verification
        working-directory: ${{ env.DESKTOP_STANDALONE_DIR }}
        run: |
          npm run test:unit
          npm run build:web

      - name: Run desktop electron tests
        if: runner.os == 'Linux'
        working-directory: ${{ env.DESKTOP_STANDALONE_DIR }}
        run: xvfb-run -a npm run test:electron

      - name: Run desktop electron tests
        if: runner.os != 'Linux'
        working-directory: ${{ env.DESKTOP_STANDALONE_DIR }}
        run: npm run test:electron

      - name: Build desktop release artifacts (signed only)
        if: runner.os == 'macOS' && !(github.event_name == 'push' && startsWith(github.ref, 'refs/tags/'))
        working-directory: ${{ env.DESKTOP_STANDALONE_DIR }}
        env:
          CSC_LINK: ${{ secrets.MACOS_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MACOS_CSC_KEY_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npm run dist:desktop -- ${{ matrix.builder_args }}

      - name: Build signed macOS app bundle
        if: runner.os == 'macOS' && github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        working-directory: ${{ env.DESKTOP_STANDALONE_DIR }}
        env:
          CSC_LINK: ${{ secrets.MACOS_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MACOS_CSC_KEY_PASSWORD }}
        run: node ./scripts/build-notarized-mac-release.cjs build-app --arch ${{ matrix.arch }}

      - name: Notarize and staple macOS app
        if: runner.os == 'macOS' && github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        working-directory: ${{ env.DESKTOP_STANDALONE_DIR }}
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: node ./scripts/build-notarized-mac-release.cjs notarize --arch ${{ matrix.arch }} --timeout-minutes 60

      - name: Package notarized macOS release artifacts
        if: runner.os == 'macOS' && github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        working-directory: ${{ env.DESKTOP_STANDALONE_DIR }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: node ./scripts/build-notarized-mac-release.cjs package --arch ${{ matrix.arch }}

      - name: Build desktop release artifacts
        if: runner.os != 'macOS'
        working-directory: ${{ env.DESKTOP_STANDALONE_DIR }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npm run dist:desktop -- ${{ matrix.builder_args }}

      - name: Write checksums
        if: success()
        run: node ./scripts/write-sha256sums.mjs --dir "${{ env.DESKTOP_STANDALONE_DIR }}/release" --out "${{ env.DESKTOP_STANDALONE_DIR }}/release/SHA256SUMS.txt"

      - name: Upload notarization diagnostics
        if: always() && runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: notarization-${{ matrix.os }}
          path: ${{ env.DESKTOP_STANDALONE_DIR }}/.notarization/**/*
          if-no-files-found: ignore

      - name: Upload workflow artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.os }}
          path: ${{ env.DESKTOP_STANDALONE_DIR }}/release/*

      - name: Publish release assets
        if: success() && github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.DESKTOP_STANDALONE_DIR }}/release/*
