name: Release TUI

on:
  workflow_dispatch:
  push:
    tags:
      - 'tui-v*'

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install workspace dependencies
        run: npm ci

      - name: Install Rollup native binary
        run: node ./hyperpipe-tui/scripts/install-rollup-native.cjs

      - name: Verify core
        run: npm --workspace ./hyperpipe-core test

      - name: Verify TUI
        run: |
          npm --workspace ./hyperpipe-tui run build
          npm --workspace ./hyperpipe-tui test

  package:
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15-intel
            platform: darwin
            arch: x64
            archive_name: hyperpipe-tui-macos-x64.zip
            notarize_timeout_minutes: 90
          - os: macos-14
            platform: darwin
            arch: arm64
            archive_name: hyperpipe-tui-macos-arm64.zip
            notarize_timeout_minutes: 120
          - os: ubuntu-latest
            platform: linux
            arch: x64
            archive_name: hyperpipe-tui-linux-x64.tar.gz
          - os: ubuntu-24.04-arm
            platform: linux
            arch: arm64
            archive_name: hyperpipe-tui-linux-arm64.tar.gz
          - os: windows-latest
            platform: win32
            arch: x64
            archive_name: hyperpipe-tui-windows-x64.zip
          - os: windows-11-arm
            platform: win32
            arch: arm64
            archive_name: hyperpipe-tui-windows-arm64.zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install workspace dependencies
        run: npm ci

      - name: Install Rollup native binary
        run: node ./hyperpipe-tui/scripts/install-rollup-native.cjs

      - name: Build and test TUI
        run: |
          npm --workspace ./hyperpipe-tui run build
          npm --workspace ./hyperpipe-tui test

      - name: Build portable bundle directory
        run: npm --workspace ./hyperpipe-tui run bundle:release -- --platform ${{ matrix.platform }} --arch ${{ matrix.arch }} --output-dir ./release

      - name: Archive portable bundle (Unix)
        if: runner.os == 'Linux'
        run: |
          cd hyperpipe-tui/release
          tar -czf ${{ matrix.archive_name }} hyperpipe-tui-${{ matrix.platform }}-${{ matrix.arch }}

      - name: Archive portable bundle (macOS)
        if: runner.os == 'macOS' && !(github.event_name == 'push' && startsWith(github.ref, 'refs/tags/'))
        run: |
          ditto -c -k --sequesterRsrc --keepParent \
            "hyperpipe-tui/release/hyperpipe-tui-${{ matrix.platform }}-${{ matrix.arch }}" \
            "hyperpipe-tui/release/${{ matrix.archive_name }}"

      - name: Sign and notarize macOS portable bundle
        if: runner.os == 'macOS' && github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        env:
          CSC_LINK: ${{ secrets.MACOS_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MACOS_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          node ./hyperpipe-tui/scripts/build-notarized-mac-release.cjs all \
            --bundle-root "hyperpipe-tui/release/hyperpipe-tui-${{ matrix.platform }}-${{ matrix.arch }}" \
            --archive-path "hyperpipe-tui/release/${{ matrix.archive_name }}" \
            --arch ${{ matrix.arch }} \
            --timeout-minutes ${{ matrix.notarize_timeout_minutes }}

      - name: Archive portable bundle (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          Compress-Archive -Path hyperpipe-tui/release/hyperpipe-tui-${{ matrix.platform }}-${{ matrix.arch }}\* -DestinationPath hyperpipe-tui/release/${{ matrix.archive_name }} -Force

      - name: Upload notarization diagnostics
        if: always() && runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: tui-notarization-${{ matrix.arch }}
          path: hyperpipe-tui/.notarization/**/*
          if-no-files-found: ignore
          include-hidden-files: true

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tui-${{ matrix.platform }}-${{ matrix.arch }}
          path: hyperpipe-tui/release/${{ matrix.archive_name }}

  publish:
    needs: package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: tui-*
          path: ./tui-release-assets
          merge-multiple: true

      - name: Write merged checksums
        run: node ./scripts/write-sha256sums.mjs --dir ./tui-release-assets --out ./tui-release-assets/SHA256SUMS.txt

      - name: Upload merged workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tui-release-assets
          path: ./tui-release-assets/*

      - name: Publish release assets
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ./tui-release-assets/*
